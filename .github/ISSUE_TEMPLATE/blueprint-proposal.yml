name: New Pattern Proposal
description: Propose a new workflow or agent pattern to be added to the documentation
labels:
  - new-pattern-proposal
body:
  - type: input
    id: name
    attributes:
      label: Pattern Name
      description: A short, precise name for the pattern (e.g. "Human-in-the-Loop").
      placeholder: "Pattern Name"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Is this a workflow pattern (developer controls flow) or an agent pattern (LLM controls flow)?
      options:
        - Workflow
        - Agent
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      description: Relative complexity compared to existing patterns.
      options:
        - Beginner
        - Intermediate
        - Advanced
    validations:
      required: true

  - type: dropdown
    id: evolves-from
    attributes:
      label: Evolves From (agent patterns only)
      description: Which existing workflow or agent pattern does this evolve from?
      options:
        - N/A (workflow pattern)
        - Prompt Chaining
        - Parallel Calls
        - Orchestrator-Worker
        - Evaluator-Optimizer
        - ReAct
        - Plan & Execute
        - Tool Use
        - Memory
        - RAG
        - Reflection
        - Routing
        - Multi-Agent
        - Event-Driven
        - Saga
        - Human in the Loop
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: One-sentence Description
      description: A single-sentence summary suitable for the metadata.json `description` field and pattern tables.
      placeholder: "Agent proposes an action; a human approves, denies, or modifies before the action commits."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem It Solves
      description: What situation or requirement makes this pattern necessary? When does a simpler pattern break down?
      placeholder: |
        This pattern addresses the case where ...
        Existing patterns fall short because ...
    validations:
      required: true

  - type: textarea
    id: when-to-use
    attributes:
      label: When to Use This Pattern
      description: 2-4 concrete scenarios where this pattern is the right answer.
      placeholder: |
        - When the action is high-stakes and must not commit without approval
        - When regulatory or compliance requirements mandate human review
    validations:
      required: true

  - type: textarea
    id: when-not-to-use
    attributes:
      label: When NOT to Use This Pattern
      description: 2-4 concrete scenarios where a simpler pattern is the right answer instead.
      placeholder: |
        - When the action is low-stakes and human approval is a rubber-stamp
        - When approver latency would break the user-facing flow
    validations:
      required: true

  - type: textarea
    id: architecture
    attributes:
      label: Architecture Summary
      description: Describe the key components and data flow. A rough Mermaid diagram is welcome but not required.
      placeholder: |
        1. The LLM produces a draft
        2. A human reviewer approves or rejects it
        3. On rejection, the LLM revises with the reviewer's feedback
    validations:
      required: true

  - type: textarea
    id: tradeoffs
    attributes:
      label: Key Tradeoffs
      description: What are the main strengths and limitations compared to related patterns?
    validations:
      required: false

  - type: textarea
    id: example-deployment
    attributes:
      label: Example Deployment
      description: Which deployment recipe in `agent-deployments` would compose this pattern? If none yet, that's fine — it's a contribution opportunity.
      placeholder: "Example: `customer-support-triage` composes Routing + Tool Use"
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: Papers, blog posts, or existing implementations that describe this pattern.
      placeholder: |
        - https://arxiv.org/abs/...
        - https://github.com/...
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution Intent
      options:
        - label: I am willing to write the documentation for this pattern (overview, design, implementation).
          required: false
        - label: I am willing to write the reference implementation.
          required: false
