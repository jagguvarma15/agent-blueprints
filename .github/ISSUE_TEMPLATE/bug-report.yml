name: Bug Report
description: Report an error in documentation, a broken link, a website issue, or incorrect code in a reference implementation
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: What part of the repo contains the bug?
      options:
        - Documentation (incorrect or misleading content)
        - Broken link or cross-reference
        - Website (layout, navigation, rendering)
        - Reference implementation (code under patterns/*/code/)
        - CI / validation
    validations:
      required: true

  - type: dropdown
    id: pattern
    attributes:
      label: Affected Pattern (if applicable)
      description: Which pattern does this affect? Select "N/A" if it is not pattern-specific.
      options:
        - N/A
        - Foundations
        - Composition
        - Prompt Chaining
        - Parallel Calls
        - Orchestrator-Worker
        - Evaluator-Optimizer
        - ReAct
        - Plan & Execute
        - Tool Use
        - Memory
        - RAG
        - Reflection
        - Routing
        - Multi-Agent
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug clearly. For documentation errors, quote the incorrect text and explain what is wrong. For broken links, include the page and link text. For code errors, include the file path and the incorrect behaviour.
      placeholder: |
        In patterns/react/design.md, the section "Error Handling" states that ...
        but the actual behaviour described contradicts the implementation in code/python/react_agent.py because ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should the documentation say, the link resolve to, or the code do?
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: File or URL
      description: Path to the file (e.g. `patterns/react/design.md`) or URL of the affected page.
      placeholder: "patterns/react/design.md"
    validations:
      required: false
