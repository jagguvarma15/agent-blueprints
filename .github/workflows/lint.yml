name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: ruff check
        run: uv run --with 'ruff>=0.6' ruff check .
      - name: ruff format --check
        run: uv run --with 'ruff>=0.6' ruff format --check .
      - name: mypy (tests/)
        run: uv run --with 'mypy>=1.10' --with 'pydantic>=2' --with PyYAML --with pytest --with jsonschema mypy --config-file pyproject.toml tests/
      - name: pytest
        run: uv run --with 'pydantic>=2' --with PyYAML --with pytest --with jsonschema pytest tests/

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        # pnpm version comes from package.json's `packageManager` field.
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: pnpm install
        run: pnpm install --no-frozen-lockfile
      - name: pnpm typecheck
        run: pnpm typecheck
