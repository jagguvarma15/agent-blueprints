name: Catalog Drift Check

# Three drift gates run on every PR and push:
#   - patterns-catalog.yaml matches `validate-metadata.js --emit` output
#   - generated documentation blocks (the <!-- AUTO:... --> sections in
#     README, per-cohort READMEs, choosing-a-pattern.md, etc.) match
#     `generate-docs.js` output
#   - website/src/data/patterns.ts matches `generate-website-data.js` output
#
# All three regenerators are deterministic: same source files in →
# byte-identical output. agent-deployments CI consumes patterns-catalog.yaml
# directly so drift here would silently break downstream catalog assembly,
# and the docs/site-data drift would silently let the README and the
# /compare/ page diverge from reality.

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  drift-check:
    name: catalog + docs + website data are up to date
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        # Version comes from package.json's `packageManager` field (pnpm@9.0.0)
        # so we don't double-declare here.
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Regenerate catalog
        run: node meta/validate-metadata.js --emit patterns-catalog.yaml

      - name: Regenerate docs (AUTO blocks)
        run: node meta/generate-docs.js

      - name: Regenerate website data
        run: node meta/generate-website-data.js

      - name: Diff against committed files
        run: |
          set -e
          if ! git diff --exit-code -- patterns-catalog.yaml; then
            echo "::error::patterns-catalog.yaml is stale."
            echo "::error::Run: node meta/validate-metadata.js --emit patterns-catalog.yaml"
            echo "::error::Then commit the result."
            exit 1
          fi
          if ! git diff --exit-code -- ':(glob)**/*.md'; then
            echo "::error::Generated markdown (AUTO blocks) is stale."
            echo "::error::Run: node meta/generate-docs.js"
            echo "::error::Then commit the result."
            exit 1
          fi
          if ! git diff --exit-code -- website/src/data/patterns.ts; then
            echo "::error::website/src/data/patterns.ts is stale."
            echo "::error::Run: node meta/generate-website-data.js"
            echo "::error::Then commit the result."
            exit 1
          fi
          echo "All three generated artifacts match their inputs."
