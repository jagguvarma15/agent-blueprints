name: Documentation Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for broken internal links
        run: |
          echo "Checking for broken internal markdown links..."
          # Collect findings in a temp file so the inner subshell's writes
          # propagate to the outer scope. Prior implementation incremented
          # $errors inside a piped while-loop, which runs in a subshell,
          # so the counter was always 0 even when BROKEN messages printed.
          findings=$(mktemp)
          trap 'rm -f "$findings"' EXIT
          while IFS= read -r file; do
            dir=$(dirname "$file")
            while IFS= read -r link; do
              # Skip external URLs and anchors
              if [[ "$link" =~ ^https?:// ]] || [[ "$link" =~ ^# ]]; then
                continue
              fi
              # Remove anchor from link
              path="${link%%#*}"
              if [ -n "$path" ]; then
                target="$dir/$path"
                if [ ! -f "$target" ] && [ ! -d "$target" ]; then
                  echo "BROKEN: $file -> $link" | tee -a "$findings"
                fi
              fi
            done < <(grep -oP '\[.*?\]\(\K[^)]+' "$file" 2>/dev/null)
          done < <(find . -name '*.md' -not -path './legacy/*' -not -path './node_modules/*' -not -path './website/*')
          if [ -s "$findings" ]; then
            echo "Found $(wc -l < "$findings") broken link(s)"
            exit 1
          fi
          echo "All internal links valid"

      - name: Check pattern structure completeness
        run: |
          echo "Checking pattern documentation structure..."
          errors=0
          # Check workflows have all required docs
          for dir in workflows/prompt-chaining workflows/parallel-calls workflows/orchestrator-worker workflows/evaluator-optimizer; do
            for file in overview.md design.md implementation.md observability.md cost-and-latency.md; do
              if [ ! -s "$dir/$file" ]; then
                echo "MISSING or EMPTY: $dir/$file"
                errors=$((errors + 1))
              fi
            done
          done
          # Check patterns have all required docs
          for dir in patterns/react patterns/plan-and-execute patterns/tool-use patterns/memory patterns/rag patterns/reflection patterns/routing patterns/multi-agent; do
            for file in overview.md design.md implementation.md evolution.md observability.md cost-and-latency.md; do
              if [ ! -s "$dir/$file" ]; then
                echo "MISSING or EMPTY: $dir/$file"
                errors=$((errors + 1))
              fi
            done
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors structural issues"
            exit 1
          fi
          echo "All pattern documentation complete"

      - name: Validate metadata.json files
        run: |
          node meta/validate-metadata.js

      - name: Lint markdown (style guide enforcement)
        run: |
          npx --yes markdownlint-cli2 "**/*.md" "#legacy/**" "#node_modules/**" "#website/**"
