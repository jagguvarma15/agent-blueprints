name: Documentation Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for broken internal links
        run: |
          python3 - <<'PY'
          import os, re, sys

          # Skip third-party trees and the local docs site (its node_modules
          # carries 600+ third-party READMEs whose links aren't this repo's concern).
          SKIP_DIRS = {'./legacy', './node_modules', './website'}

          broken = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if os.path.join(root, d) not in SKIP_DIRS]
              for name in files:
                  if not name.endswith('.md'):
                      continue
                  path = os.path.join(root, name)
                  with open(path, encoding='utf-8', errors='replace') as f:
                      text = f.read()
                  # Strip fenced code blocks and inline code so function calls
                  # like `registry[name](args)` aren't treated as markdown links.
                  text = re.sub(r'```.*?```', '', text, flags=re.S)
                  text = re.sub(r'`[^`\n]*`', '', text)
                  base = os.path.dirname(path)
                  for m in re.finditer(r'\[[^\]]*\]\(([^)]+)\)', text):
                      link = m.group(1).strip()
                      if link.startswith(('http://', 'https://', '#', 'mailto:')):
                          continue
                      target = link.split('#', 1)[0]
                      if not target:
                          continue
                      abs_p = os.path.normpath(os.path.join(base, target))
                      if not (os.path.isfile(abs_p) or os.path.isdir(abs_p)):
                          broken.append(f'{path} -> {link}')

          if broken:
              print(f'Found {len(broken)} broken link(s):')
              for b in broken:
                  print(f'  BROKEN: {b}')
              sys.exit(1)
          print('All internal links valid')
          PY

      - name: Check pattern structure completeness
        run: |
          echo "Checking entry documentation structure across all cohorts..."
          errors=0
          # Required tier files for every entry in every cohort (patterns,
          # primitives, modifiers). Workflows now live under patterns/ with
          # `category: workflow` in metadata.json, so a single glob covers
          # them too. Optional polish files (evolution, observability,
          # cost-and-latency, code/) are checked per-directory via
          # metadata.json + validate-metadata.js below.
          shopt -s nullglob
          for dir in patterns/*/ primitives/*/ modifiers/*/; do
            for file in overview.md design.md implementation.md; do
              if [ ! -s "$dir$file" ]; then
                echo "MISSING or EMPTY: $dir$file"
                errors=$((errors + 1))
              fi
            done
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors structural issues"
            exit 1
          fi
          echo "All entry documentation complete"

      - name: Install pnpm
        # Version comes from package.json's `packageManager` field.
        uses: pnpm/action-setup@v6

      - name: Set up Node for metadata validator
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install root dependencies (js-yaml for validator + generators)
        run: pnpm install --no-frozen-lockfile

      - name: Validate metadata.json files
        run: |
          node meta/validate-metadata.js

      - name: Lint markdown (style guide enforcement)
        # Exclusions (gitignored trees, website/, legacy/) live in
        # .markdownlint-cli2.yaml so local runs match CI without duplicating
        # the glob list here.
        run: |
          npx --yes markdownlint-cli2 "**/*.md"

      - name: Set up Node for website build
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Build website
        working-directory: website
        run: |
          npm ci
          npm run build
