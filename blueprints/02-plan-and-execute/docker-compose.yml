services:
  agent:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./python:/app
    command: ["sh", "-c", "echo 'Plan-and-Execute blueprint container ready'; sleep infinity"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MODEL=${MODEL:-claude-opus-4-6}
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
