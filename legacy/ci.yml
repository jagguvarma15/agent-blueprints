name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  consistency-checks:
    name: Consistency Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Manifest vs filesystem consistency
        run: node scripts/check-manifest-consistency.mjs

      - name: Markdown local link check
        run: node scripts/check-markdown-links.mjs

      - name: Identity link consistency
        run: node scripts/check-identity-links.mjs

      - name: Build CLI
        run: |
          cd cli
          npm install
          npm run build

      - name: CLI smoke scaffold
        run: node scripts/cli-smoke-test.mjs

  lint-test-python:
    name: Lint & Test Python (${{ matrix.blueprint }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        blueprint:
          - blueprints/01-react-agent/python
          - blueprints/04-multi-agent-supervisor/python
          - blueprints/07-rag-basic/python

    defaults:
      run:
        working-directory: ${{ matrix.blueprint }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev || uv sync

      - name: Lint with ruff
        run: uv run ruff check src/

      - name: Type-check with mypy
        run: uv run mypy src/

      - name: Run tests
        run: uv run pytest tests/ -v

  lint-test-typescript:
    name: Lint & Test TypeScript (${{ matrix.blueprint }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        blueprint:
          - blueprints/01-react-agent/typescript
          - blueprints/04-multi-agent-supervisor/typescript
          - blueprints/07-rag-basic/typescript

    defaults:
      run:
        working-directory: ${{ matrix.blueprint }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack and install dependencies
        run: corepack enable && pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build Docusaurus site
        run: npm run build
